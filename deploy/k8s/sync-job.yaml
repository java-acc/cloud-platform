apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-job
  namespace: byc-cloud-platform
  labels:
    app: sync-job
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sync-job
  template:
    metadata:
      labels:
        app: sync-job
    spec:
      containers:
        - name: sync-job
          image: byc-cloud-platform/sync-job:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: nacos.byc-cloud-platform.svc.cluster.local:8848
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: nacos.byc-cloud-platform.svc.cluster.local:8848
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sync-job
  namespace: byc-cloud-platform
spec:
  type: ClusterIP
  selector:
    app: sync-job
  ports:
    - port: 8090
      targetPort: 8090
      name: http
