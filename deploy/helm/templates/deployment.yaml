{ { - range $name, $svc := .Values.services } }
  { { - if $svc.enabled } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: { { $name } }
  namespace: { { $.Values.global.namespace } }
  labels:
    app: { { $name } }
    { { - include "platform.labels" $ | nindent 4 } }
spec:
  replicas: { { $svc.replicas | default 1 } }
  selector:
    matchLabels:
      app: { { $name } }
  template:
    metadata:
      labels:
        app: { { $name } }
    spec:
      containers:
        - name: { { $name } }
          image: "{{- if $.Values.global.imageRegistry }}{{ $.Values.global.imageRegistry }}/{{- end }}{{ $svc.image }}:{{ $svc.tag | default "latest" }}"
          imagePullPolicy: { { $.Values.global.imagePullPolicy } }
          ports:
            - containerPort: { { $svc.port | default 8080 } }
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: { { $.Values.global.springProfile | quote } }
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: { { $.Values.nacos.server | quote } }
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: { { $.Values.nacos.server | quote } }
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: { { $svc.port | default 8080 } }
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: { { $svc.port | default 8080 } }
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: { { $name } }
  namespace: { { $.Values.global.namespace } }
spec:
  type: ClusterIP
  selector:
    app: { { $name } }
  ports:
    - port: { { $svc.port | default 8080 } }
      targetPort: { { $svc.port | default 8080 } }
      name: http
  { { - end } }
  { { - end } }
