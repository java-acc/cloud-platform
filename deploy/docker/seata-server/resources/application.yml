server:
  port: 8091

spring:
  application:
    name: seata-server
  main:
    web-application-type: none

logging:
#  level:
#    org.apache.seata.config: DEBUG
#    org.apache.seata.config.nacos: TRACE
#    com.alibaba.nacos: DEBUG
  config: classpath:logback-spring.xml
  file:
    path: ${log.home:${user.home}/logs/seata}
  extend:
    logstash-appender:
      # off by default
      enabled: false
      destination: 127.0.0.1:4560
    kafka-appender:
      # off by default
      enabled: false
      bootstrap-servers: 127.0.0.1:9092
      topic: logback_to_logstash
      producer:
        acks: 0
        linger-ms: 1000
        max-block-ms: 0
    metric-appender:
      # off by default
      enabled: false

console:
  user:
    username: seata
    password: seata

seata:
  config:
    type: nacos
    nacos:
      server-addr: nacos:8848
      namespace: 40d932a0-a329-4909-bc9b-b60cbfb0513a
      group: SEATA_GROUP
      username: nacos
      password: nacos
      context-path:
      data-id: seataServer.properties
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: nacos:8848
      group: SEATA_GROUP
      namespace: 40d932a0-a329-4909-bc9b-b60cbfb0513a
      cluster: default
      username: nacos
      password: nacos
      context-path:
