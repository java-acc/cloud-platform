name: Build and Test

on:
  push:
    branches: [ "master", "dev" ]
    paths-ignore: [ "**.md" ]
  pull_request:
    branches: [ "master", "dev" ]
    paths-ignore: [ "**.md" ]
permissions:
  contents: read
jobs:
  lint:
    if: (github.repository == 'java-acc/byc-cloud-platform')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Format Check
        run: mvn spotless:check --file pom.xml
        continue-on-error: true # 避免格式插件未配置时直接报错

      - name: Checkstyle Verification
        run: mvn checkstyle:check --file pom.xml
  build:
    if: (github.repository == 'java-acc/byc-cloud-platform')
    needs: lint # 确保 lint（格式和规范检查）通过后再执行构建，节省资源
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 运行测试环节
      - name: Run Tests
        run: mvn test --file pom.xml

      # 打包构建环节（跳过测试，因为上一步已经跑过了）
      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      # 依赖图谱提交（可选）
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
